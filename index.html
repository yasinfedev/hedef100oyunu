<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hedef 100 | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --primary: #38bdf8;
            --secondary: #818cf8; --accent: #f472b6; --success: #22c55e;
            --danger: #ef4444; --text: #f1f5f9; --disabled: #475569;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

        body {
            background-color: var(--bg-color); color: var(--text);
            font-family: 'Poppins', sans-serif; display: flex;
            flex-direction: column; align-items: center; min-height: 100vh; padding: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif; font-size: 2.2rem; margin-bottom: 15px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 3px;
        }

        .stats-container {
            display: flex; gap: 15px; margin-bottom: 15px; background: var(--card-bg);
            padding: 10px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-item { text-align: center; min-width: 65px; }
        .stat-value { display: block; font-size: 1.2rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; opacity: 0.7; }

        #game-board {
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px;
            background: var(--card-bg); padding: 8px; border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 450px;
        }

        .cell {
            aspect-ratio: 1/1; background: rgba(255,255,255,0.03); border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; font-weight: 600; transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .cell.clickable {
            background: rgba(56, 189, 248, 0.15); cursor: pointer;
            border-color: var(--primary); animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .cell.clicked { background: var(--secondary); color: white; }
        .cell.last-clicked { background: var(--accent); transform: scale(1.08); box-shadow: 0 0 15px var(--accent); }

        .controls { margin-top: 20px; display: flex; gap: 10px; width: 100%; max-width: 450px; }
        
        button {
            flex: 1; padding: 12px; border: none; border-radius: 8px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
            font-family: 'Orbitron', sans-serif; font-size: 0.75rem;
            color: white;
        }

        .btn-undo { background: var(--success); }
        /* Geri al hakkı bitince butonun hali */
        .btn-undo:disabled {
            background: var(--disabled) !important;
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            filter: grayscale(1);
        }

        .btn-reset { background: var(--danger); }
        .btn-audio { background: #475569; flex: 0.5; }

        .leaderboard {
            margin-top: 30px; width: 100%; max-width: 450px;
            background: rgba(30, 41, 59, 0.5); padding: 15px; border-radius: 10px;
        }

        .leaderboard h3 { font-family: 'Orbitron'; font-size: 1rem; margin-bottom: 10px; text-align: center; color: var(--accent); }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; opacity: 0.6; padding-bottom: 5px; }
        td { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <h1>HEDEF 100</h1>

    <div class="stats-container">
        <div class="stat-item">
            <span class="stat-value" id="scoreDisplay">0</span>
            <span class="stat-label">SKOR</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="timerDisplay">00:00</span>
            <span class="stat-label">SÜRE</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="undoDisplay">3</span>
            <span class="stat-label">HAK</span>
        </div>
    </div>

    <div id="game-board"></div>

    <div class="controls">
        <button class="btn-audio" id="muteBtn" onclick="toggleMute()">MÜZİK: KAPALI</button>
        <button class="btn-undo" id="undoBtn" onclick="undoMove()">GERİ AL</button>
        <button class="btn-reset" onclick="resetGame()">SIFIRLA</button>
    </div>

    <div class="leaderboard">
        <h3>🏆 EN YÜKSEK SKORLAR</h3>
        <table id="leaderboardTable">
            <thead>
                <tr><th>#</th><th>Skor</th><th>Süre</th><th>Tarih</th></tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>

    <!-- Ses Kaynakları (Eğer bunlar çalışmazsa, tarayıcıda doğrudan linkleri açıp yüklenip yüklenmediğini kontrol edebilirsin) -->
    <audio id="bgMusic" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
    <audio id="clickSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-simple-game-countdown-921.mp3" type="audio/mpeg">
    </audio>
    <audio id="errorSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-negative-tone-interface-608.mp3" type="audio/mpeg">
    </audio>

    <script>
        const GRID_SIZE = 10;
        let score = 0, history = [], undoRights = 3, timer = 0, timerInterval = null, isMusicPlaying = false;
        
        const board = document.getElementById('game-board');
        const bgMusic = document.getElementById('bgMusic');
        const clickSound = document.getElementById('clickSound');
        const errorSound = document.getElementById('errorSound');

        // Müzik sesini biraz kısalaım ki kullanıcıyı yormasın
        bgMusic.volume = 0.3;

        function initBoard() {
            board.innerHTML = '';
            for (let y = 1; y <= GRID_SIZE; y++) {
                for (let x = 1; x <= GRID_SIZE; x++) {
                    const cell = document.createElement('div');
                    cell.id = `x${x}y${y}`;
                    cell.className = 'cell clickable';
                    cell.onclick = () => handleCellClick(x, y);
                    board.appendChild(cell);
                }
            }
            updateLeaderboard();
            updateUI();
        }

        function handleCellClick(x, y) {
            const target = document.getElementById(`x${x}y${y}`);
            
            if (!target.classList.contains('clickable')) {
                playSound(errorSound);
                return;
            }

            if (score === 0) startTimer();
            playSound(clickSound);

            const prevLast = document.querySelector('.last-clicked');
            if (prevLast) {
                prevLast.classList.remove('last-clicked');
                prevLast.classList.add('clicked');
            }

            score++;
            target.innerText = score;
            target.classList.add('clicked', 'last-clicked');
            target.classList.remove('clickable');
            
            history.push({x, y});
            updateUI();
            calculateNextMoves(x, y);
        }

        function calculateNextMoves(x, y) {
            document.querySelectorAll('.cell.clickable').forEach(c => c.classList.remove('clickable'));
            const moves = [
                {dx:3, dy:0}, {dx:-3, dy:0}, {dx:0, dy:3}, {dx:0, dy:-3},
                {dx:2, dy:2}, {dx:-2, dy:-2}, {dx:2, dy:-2}, {dx:-2, dy:2}
            ];

            let possibleMoves = 0;
            moves.forEach(m => {
                const nx = x + m.dx, ny = y + m.dy;
                if (nx >= 1 && nx <= GRID_SIZE && ny >= 1 && ny <= GRID_SIZE) {
                    const cell = document.getElementById(`x${nx}y${ny}`);
                    if (!cell.classList.contains('clicked')) {
                        cell.classList.add('clickable');
                        possibleMoves++;
                    }
                }
            });

            if (possibleMoves === 0 && score < 100) endGame();
        }

        function startTimer() {
            if (timerInterval) return;
            timerInterval = setInterval(() => {
                timer++;
                const mins = String(Math.floor(timer / 60)).padStart(2, '0');
                const secs = String(timer % 60).padStart(2, '0');
                document.getElementById('timerDisplay').innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function endGame() {
            clearInterval(timerInterval);
            saveScore(score, timer);
            setTimeout(() => alert(`Oyun Bitti! Skorunuz: ${score}`), 500);
        }

        function toggleMute() {
            if (!isMusicPlaying) {
                bgMusic.play().then(() => {
                    isMusicPlaying = true;
                    document.getElementById('muteBtn').innerText = "MÜZİK: AÇIK";
                }).catch(e => console.log("Müzik başlatılamadı:", e));
            } else {
                bgMusic.pause();
                isMusicPlaying = false;
                document.getElementById('muteBtn').innerText = "MÜZİK: KAPALI";
            }
        }

        function playSound(audioElement) {
            // Sesi başa sar ve oynat (Hızlı tıklamalarda sorun olmaması için)
            audioElement.currentTime = 0;
            audioElement.play().catch(e => console.log("Ses oynatılamadı:", e));
        }

        function undoMove() {
            if (undoRights <= 0 || history.length <= 1) return;

            const lastMove = history.pop();
            const cell = document.getElementById(`x${lastMove.x}y${lastMove.y}`);
            cell.innerText = '';
            cell.classList.remove('clicked', 'last-clicked');

            undoRights--;
            score--;

            const newLast = history[history.length - 1];
            if (newLast) {
                const newLastCell = document.getElementById(`x${newLast.x}y${newLast.y}`);
                newLastCell.classList.remove('clicked');
                newLastCell.classList.add('last-clicked');
                calculateNextMoves(newLast.x, newLast.y);
            }

            updateUI();
        }

        function updateUI() {
            document.getElementById('scoreDisplay').innerText = score;
            document.getElementById('undoDisplay').innerText = undoRights;
            
            // Butonun inaktiflik kontrolü
            const undoBtn = document.getElementById('undoBtn');
            if (undoRights <= 0 || history.length <= 1) {
                undoBtn.disabled = true;
            } else {
                undoBtn.disabled = false;
            }
        }

        function saveScore(s, t) {
            let scores = JSON.parse(localStorage.getItem('h100ScoresPro') || '[]');
            scores.push({ score: s, time: t, date: new Date().toLocaleDateString('tr-TR') });
            scores.sort((a, b) => b.score - a.score || a.time - b.time);
            localStorage.setItem('h100ScoresPro', JSON.stringify(scores.slice(0, 5)));
            updateLeaderboard();
        }

        function updateLeaderboard() {
            const scores = JSON.parse(localStorage.getItem('h100ScoresPro') || '[]');
            const body = document.getElementById('leaderboardBody');
            body.innerHTML = scores.map((item, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td><b>${item.score}</b></td>
                    <td>${item.time}sn</td>
                    <td>${item.date}</td>
                </tr>
            `).join('');
        }

        function resetGame() {
            clearInterval(timerInterval);
            timerInterval = null;
            timer = 0;
            document.getElementById('timerDisplay').innerText = "00:00";
            score = 0;
            history = [];
            undoRights = 3;
            initBoard();
        }

        initBoard();
    </script>
</body>
</html>
