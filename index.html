<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hedef 100 | Pro Max</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --primary: #38bdf8;
            --secondary: #818cf8; --accent: #f472b6; --success: #22c55e;
            --danger: #ef4444; --text: #f1f5f9; --disabled: #475569;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

        body {
            background-color: var(--bg-color); color: var(--text);
            font-family: 'Poppins', sans-serif; display: flex;
            flex-direction: column; align-items: center; min-height: 100vh; padding: 20px;
        }

        .header-logo {
            font-family: 'Orbitron', sans-serif; font-size: 2.2rem; margin-bottom: 15px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 3px; font-weight: 700;
        }

        .stats-container {
            display: flex; gap: 10px; margin-bottom: 15px; background: var(--card-bg);
            padding: 10px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-item { text-align: center; min-width: 60px; }
        .stat-value { display: block; font-size: 1.1rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.7; }

        #game-board {
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px;
            background: var(--card-bg); padding: 8px; border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 450px;
        }

        .cell {
            aspect-ratio: 1/1; background: rgba(255,255,255,0.03); border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; font-weight: 600; transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.05); color: #fff;
        }

        .cell.clickable { background: rgba(56, 189, 248, 0.15); cursor: pointer; border-color: var(--primary); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .cell.clicked { background: var(--secondary); }
        .cell.last-clicked { background: var(--accent); transform: scale(1.05); box-shadow: 0 0 15px var(--accent); }

        .controls { margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; max-width: 450px; }
        .audio-controls { display: flex; gap: 8px; grid-column: span 2; }
        
        button {
            padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer;
            transition: 0.2s; font-family: 'Orbitron', sans-serif; font-size: 0.7rem; color: white;
            display: flex; align-items: center; justify-content: center;
        }
        button:active { transform: scale(0.95); }
        .btn-undo { background: var(--success); }
        .btn-undo:disabled { background: var(--disabled); opacity: 0.5; cursor: not-allowed; }
        .btn-reset { background: var(--danger); }
        .btn-audio { background: #475569; flex: 1; font-size: 0.6rem; }

        #resultModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); display: none;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .result-card {
            background: var(--card-bg); padding: 30px; border-radius: 20px;
            text-align: center; border: 2px solid var(--primary);
            width: 90%; max-width: 400px;
        }
        .result-score { font-size: 4rem; font-weight: 800; color: var(--primary); line-height: 1; margin: 10px 0; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-share { background: var(--secondary); flex: 1; }
        .btn-replay { background: var(--success); flex: 1; }
    </style>
</head>
<body onclick="unlockAudio()">

    <div class="header-logo">HEDEF 100</div>

    <div class="stats-container">
        <div class="stat-item"><span class="stat-value" id="scoreDisplay">0</span><span class="stat-label">SKOR</span></div>
        <div class="stat-item"><span class="stat-value" id="timerDisplay">00:00</span><span class="stat-label">SÜRE</span></div>
        <div class="stat-item"><span class="stat-value" id="undoDisplay">3</span><span class="stat-label">HAK</span></div>
    </div>

    <div id="game-board"></div>

    <div class="controls">
        <div class="audio-controls">
            <button class="btn-audio" onclick="toggleMusic(event)">🎵 MÜZİK: <span id="musStatus">KAPALI</span></button>
            <button class="btn-audio" onclick="toggleSFX(event)">🔊 EFEKT: <span id="sfxStatus">AÇIK</span></button>
        </div>
        <button class="btn-undo" id="undoBtn" onclick="undoMove(event)">GERİ AL</button>
        <button class="btn-reset" onclick="resetGame(event)">SIFIRLA</button>
    </div>

    <div id="resultModal">
        <div class="result-card" id="captureArea">
            <div class="header-logo" style="font-size: 1.5rem;">HEDEF 100</div>
            <p>OYUN BİTTİ</p>
            <div class="result-score" id="finalScore">0</div>
            <div class="result-meta" id="finalTime">00:00 sürede tamamlandı.</div>
            <div class="modal-buttons">
                <button class="btn-share" onclick="shareScore()">PAYLAŞ</button>
                <button class="btn-replay" onclick="closeModal()">TEKRAR</button>
            </div>
        </div>
    </div>

    <!-- Ses Dosyaları (Preload ve Crossorigin Ayarlı) -->
    <audio id="bgMusic" loop preload="auto" crossorigin="anonymous">
        <source src="https://assets.mixkit.co/music/preview/mixkit-dreaming-big-31.mp3" type="audio/mpeg">
    </audio>
    <audio id="sfxClick" preload="auto" crossorigin="anonymous">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-typewriter-soft-click-1125.mp3" type="audio/mpeg">
    </audio>
    <audio id="sfxError" preload="auto" crossorigin="anonymous">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3" type="audio/mpeg">
    </audio>
    <audio id="sfxUndo" preload="auto" crossorigin="anonymous">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-fast-double-click-on-mouse-2751.mp3" type="audio/mpeg">
    </audio>
    <audio id="sfxReset" preload="auto" crossorigin="anonymous">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-camera-shutter-click-1133.mp3" type="audio/mpeg">
    </audio>

    <script>
        let score = 0, history = [], undoRights = 3, timer = 0, timerInterval = null;
        let musicEnabled = false, sfxEnabled = true, audioUnlocked = false;

        const bgMusic = document.getElementById('bgMusic');
        bgMusic.volume = 0.15;

        // KRİTİK: Tarayıcı ses engelini aşmak için ilk dokunuşu yakala
        function unlockAudio() {
            if (audioUnlocked) return;
            // Boş ses oynatarak kanalı aç
            bgMusic.play().then(() => {
                bgMusic.pause();
                audioUnlocked = true;
                console.log("Ses kanalı aktif.");
            }).catch(e => console.log("Etkileşim bekleniyor..."));
        }

        function playSFX(audioId) {
            if (!sfxEnabled) return;
            const sound = document.getElementById(audioId);
            if (sound) {
                sound.pause();
                sound.currentTime = 0;
                sound.play().catch(e => console.warn("Ses oynatılamadı:", e));
            }
        }

        function toggleMusic(e) {
            e.stopPropagation();
            musicEnabled = !musicEnabled;
            document.getElementById('musStatus').innerText = musicEnabled ? "AÇIK" : "KAPALI";
            musicEnabled ? bgMusic.play() : bgMusic.pause();
            playSFX('sfxClick');
        }

        function toggleSFX(e) {
            e.stopPropagation();
            sfxEnabled = !sfxEnabled;
            document.getElementById('sfxStatus').innerText = sfxEnabled ? "AÇIK" : "KAPALI";
            if(sfxEnabled) playSFX('sfxClick');
        }

        function initBoard() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            for (let i = 1; i <= 100; i++) {
                const y = Math.ceil(i / 10), x = i % 10 || 10;
                const cell = document.createElement('div');
                cell.id = `x${x}y${y}`;
                cell.className = 'cell clickable';
                cell.onclick = (e) => { e.stopPropagation(); handleMove(x, y); };
                board.appendChild(cell);
            }
        }

        function handleMove(x, y) {
            const cell = document.getElementById(`x${x}y${y}`);
            if (!cell.classList.contains('clickable')) {
                playSFX('sfxError');
                return;
            }

            if (score === 0) startTimer();
            playSFX('sfxClick');

            const last = document.querySelector('.last-clicked');
            if (last) { last.classList.remove('last-clicked'); last.classList.add('clicked'); }

            score++;
            cell.innerText = score;
            cell.classList.add('clicked', 'last-clicked');
            cell.classList.remove('clickable');
            history.push({x, y});
            
            updateUI();
            checkPossibleMoves(x, y);
        }

        function checkPossibleMoves(x, y) {
            document.querySelectorAll('.cell.clickable').forEach(c => c.classList.remove('clickable'));
            const moves = [{dx:3,dy:0},{dx:-3,dy:0},{dx:0,dy:3},{dx:0,dy:-3},{dx:2,dy:2},{dx:-2,dy:-2},{dx:2,dy:-2},{dx:-2,dy:2}];
            let count = 0;
            moves.forEach(m => {
                const nx = x + m.dx, ny = y + m.dy;
                if (nx>0 && nx<11 && ny>0 && ny<11) {
                    const target = document.getElementById(`x${nx}y${ny}`);
                    if (!target.classList.contains('clicked')) { target.classList.add('clickable'); count++; }
                }
            });
            if (count === 0 && score > 0) showResult();
        }

        function undoMove(e) {
            if (e) e.stopPropagation();
            if (undoRights <= 0 || history.length <= 1) return;
            
            playSFX('sfxUndo');
            const last = history.pop();
            const cell = document.getElementById(`x${last.x}y${last.y}`);
            cell.innerText = ''; 
            cell.classList.remove('clicked', 'last-clicked');
            
            undoRights--; 
            score--;
            
            const prev = history[history.length - 1];
            const prevCell = document.getElementById(`x${prev.x}y${prev.y}`);
            prevCell.classList.remove('clicked');
            prevCell.classList.add('last-clicked');
            
            checkPossibleMoves(prev.x, prev.y);
            updateUI();
        }

        function updateUI() {
            document.getElementById('scoreDisplay').innerText = score;
            document.getElementById('undoDisplay').innerText = undoRights;
            document.getElementById('undoBtn').disabled = (undoRights <= 0 || history.length <= 1);
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timer++;
                const m = String(Math.floor(timer/60)).padStart(2,'0'), s = String(timer%60).padStart(2,'0');
                document.getElementById('timerDisplay').innerText = `${m}:${s}`;
            }, 1000);
        }

        function showResult() {
            clearInterval(timerInterval);
            document.getElementById('finalScore').innerText = score;
            document.getElementById('finalTime').innerText = document.getElementById('timerDisplay').innerText + " sürede tamamlandı.";
            document.getElementById('resultModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
            resetGame();
        }

        function resetGame(e) {
            if (e) e.stopPropagation();
            playSFX('sfxReset');
            clearInterval(timerInterval);
            timer = 0; score = 0; undoRights = 3; history = [];
            document.getElementById('timerDisplay').innerText = "00:00";
            initBoard(); updateUI();
        }

        async function shareScore() {
            const btns = document.querySelector('.modal-buttons');
            btns.style.display = 'none';
            const canvas = await html2canvas(document.querySelector("#captureArea"), {
                backgroundColor: '#1e293b'
            });
            const image = canvas.toDataURL("image/png");
            const link = document.createElement('a');
            link.download = `hedef100-skor-${score}.png`;
            link.href = image;
            link.click();
            btns.style.display = 'flex';
        }

        initBoard();
    </script>
</body>
</html>
