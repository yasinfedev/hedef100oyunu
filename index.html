<!prototype html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hedef 100 | Strateji Oyunu</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --secondary: #818cf8;
            --accent: #f472b6;
            --success: #22c55e;
            --danger: #ef4444;
            --text: #f1f5f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 15px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-item { text-align: center; }
        .stat-value { display: block; font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.7; }

        #game-board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 95vw;
            width: 500px;
        }

        .cell {
            aspect-ratio: 1 / 1;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: default;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .cell.clickable {
            background: rgba(56, 189, 248, 0.2);
            cursor: pointer;
            border: 1px solid var(--primary);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .cell.clicked {
            background: var(--secondary);
            color: white;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        .cell.last-clicked {
            background: var(--accent);
            transform: scale(1.1);
            z-index: 2;
            box-shadow: 0 0 15px var(--accent);
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
        }

        .btn-undo { background: var(--success); color: white; }
        .btn-reset { background: var(--danger); color: white; }
        button:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }
        button:active { transform: scale(0.95); }

        .rules-btn {
            margin-top: 20px;
            color: var(--primary);
            text-decoration: underline;
            font-size: 0.9rem;
            cursor: pointer;
        }

        /* Responsive Settings */
        @media (max-width: 500px) {
            #game-board { gap: 2px; padding: 5px; }
            .cell { font-size: 0.9rem; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <h1>Target 100</h1>

    <div class="stats-container">
        <div class="stat-item">
            <span class="stat-value" id="scoreDisplay">0</span>
            <span class="stat-label">Skor</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="undoDisplay">3</span>
            <span class="stat-label">Geri Al</span>
        </div>
    </div>

    <div id="game-board"></div>

    <div class="controls">
        <button class="btn-undo" id="undoBtn" onclick="undoMove()">Geri Al</button>
        <button class="btn-reset" onclick="resetGame()">Sıfırla</button>
    </div>

    <div class="rules-btn" onclick="alert('Kurallar:\n1. Yatay/Dikey: 3 kare atla.\n2. Çapraz: 2 kare atla.\nHedef: 100!')">Nasıl Oynanır?</div>

    <script>
        const GRID_SIZE = 10;
        let score = 0;
        let history = [];
        let undoRights = 3;
        const board = document.getElementById('game-board');

        // Oyunu Başlat
        function initBoard() {
            board.innerHTML = '';
            for (let y = 1; y <= GRID_SIZE; y++) {
                for (let x = 1; x <= GRID_SIZE; x++) {
                    const cell = document.createElement('div');
                    cell.id = `x${x}y${y}`;
                    cell.className = 'cell clickable';
                    cell.dataset.x = x;
                    cell.dataset.y = y;
                    cell.onclick = () => handleCellClick(x, y);
                    board.appendChild(cell);
                }
            }
        }

        function handleCellClick(x, y) {
            const target = document.getElementById(`x${x}y${y}`);
            if (!target.classList.contains('clickable')) return;

            // Önceki son tıklananı normale çek
            const prevLast = document.querySelector('.last-clicked');
            if (prevLast) {
                prevLast.classList.remove('last-clicked');
                prevLast.classList.add('clicked');
            }

            // Yeni tıklananı işaretle
            score++;
            target.innerText = score;
            target.classList.add('clicked', 'last-clicked');
            target.classList.remove('clickable');
            
            history.push({x, y});
            updateUI();
            calculateNextMoves(x, y);
        }

        function calculateNextMoves(x, y) {
            // Tüm clickable'ları temizle
            document.querySelectorAll('.cell.clickable').forEach(c => c.classList.remove('clickable'));
            
            const moves = [
                {dx: 3, dy: 0}, {dx: -3, dy: 0}, {dx: 0, dy: 3}, {dx: 0, dy: -3}, // Yatay-Dikey
                {dx: 2, dy: 2}, {dx: -2, dy: -2}, {dx: 2, dy: -2}, {dx: -2, dy: 2} // Çapraz
            ];

            let possibleMoves = 0;
            moves.forEach(m => {
                const nx = x + m.dx;
                const ny = y + m.dy;
                if (nx >= 1 && nx <= GRID_SIZE && ny >= 1 && ny <= GRID_SIZE) {
                    const cell = document.getElementById(`x${nx}y${ny}`);
                    if (!cell.classList.contains('clicked')) {
                        cell.classList.add('clickable');
                        possibleMoves++;
                    }
                }
            });

            if (possibleMoves === 0 && score < 100) {
                setTimeout(() => alert(`Oyun Bitti! Skorun: ${score}`), 300);
            } else if (score === 100) {
                alert("EFSANESİN! 100'e ulaştın!");
            }
        }

        function undoMove() {
            if (undoRights <= 0 || history.length <= 1) return;

            const lastMove = history.pop();
            const cell = document.getElementById(`x${lastMove.x}y${lastMove.y}`);
            cell.innerText = '';
            cell.classList.remove('clicked', 'last-clicked');

            undoRights--;
            score--;

            const newLast = history[history.length - 1];
            const newLastCell = document.getElementById(`x${newLast.x}y${newLast.y}`);
            newLastCell.classList.add('last-clicked');
            
            updateUI();
            calculateNextMoves(newLast.x, newLast.y);
        }

        function updateUI() {
            document.getElementById('scoreDisplay').innerText = score;
            document.getElementById('undoDisplay').innerText = undoRights;
            document.getElementById('undoBtn').disabled = (undoRights <= 0 || history.length <= 1);
        }

        function resetGame() {
            score = 0;
            history = [];
            undoRights = 3;
            initBoard();
            updateUI();
        }

        initBoard();
    </script>
</body>
</html>
